# Example profile for running the integration tests.
# Populate the SNOWFLAKE_TEST_* environment variables before running.
dbt_cortex_agent:
  target: snowflake
  outputs:
    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_TEST_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_TEST_USER') }}"
      password: "{{ env_var('SNOWFLAKE_TEST_PASSWORD', '') }}"
      authenticator: "{{ env_var('SNOWFLAKE_TEST_AUTHENTICATOR', 'snowflake') }}"
      role: "{{ env_var('SNOWFLAKE_TEST_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_TEST_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_TEST_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_TEST_SCHEMA') }}"
      threads: 4
    duckdb:
      type: duckdb
      path: ":memory:"
      threads: 4
